<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mirror interviews you with AI, finds patterns you missed, and produces a private insight document and a polished public profile. Nothing leaves your device." />
    <!--
      CSP mirrors src-tauri/tauri.conf.json for the PWA build.
      The trailing https: in connect-src exists because the openai-compatible
      provider takes a user-supplied endpoint that isn't known at build time.
      TODO (Phase 4B follow-up): generate this CSP at app launch from saved
      settings so connect-src can be pinned to the active endpoint only.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-src 'self' data:; connect-src 'self' https://api.openai.com https://api.anthropic.com https://api.mistral.ai https:;" />
    <title>Mirror</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
